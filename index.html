<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Sales Form</title>
</head>
<body>
    <h1>BR Sales Form</h1>
    <form id="salesForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="amount">Amount:</label>
        <input type="number" id="amount" name="amount" required>
        <button type="button" onclick="downloadCSV()">Download CSV</button>
    </form>
    <script>
        function downloadCSV() {
            let csvContent = 'data:text/csv;charset=utf-8,';
            // Sample data
            const rows = [
                ['Name', 'Amount'],
                [document.getElementById('name').value, document.getElementById('amount').value]
            ];
            rows.forEach(row => {
                csvContent += row.join(',') + '\n';
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement('a');
            link.setAttribute('href', encodedUri);
            link.setAttribute('download', 'sales_data.xlsx'); // Using .xlsx extension for iOS compatibility
            link.setAttribute('type', 'application/vnd.ms-excel'); // Setting MIME type for Excel
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
